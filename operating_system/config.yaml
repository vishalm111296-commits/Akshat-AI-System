# Akshat-AI-System Global Configuration
# L0 — Operating System
# Last fixed: 2026-06-19 (audit pass 2)

repository:
  name: Akshat-AI-System
  version: "1.1.0"
  built: "2026-06-19"
  maintainer: "vishalm111296-commits"

paths:
  knowledge: "knowledge/"
  raw_sources: "raw_sources/"
  skills: "skills/"
  automation: "automation/"
  changelog: "changelog/"
  tests: "tests/"
  docs: "docs/"
  workflows_knowledge: "workflows/"

knowledge_files:
  master_system:    "knowledge/01_Akshat_Master_System.md"
  frequency_table:  "knowledge/02_Akshat_Principle_Frequency_Table.md"
  source_database:  "knowledge/03_Akshat_Source_Database.md"
  recent_changes:   "knowledge/04_Akshat_Recent_Changes.md"
  knowledge_router: "routing/05_Akshat_Knowledge_Router.md"
  skill_router:     "routing/06_Skill_Router.md"
  workflow_skills:  "workflows/07_Akshat_Workflow_Skills.md"
  update_protocol:  "update_engine/08_Akshat_Update_Protocol.md"

update_engine:
  promotion_threshold: 8         # Min independent sources to promote to Master (aligned with Frequency Table)
  recent_changes_ttl_days: 365   # Days before a Recent Change entry is eligible for archival
  auto_modify_master: false      # MUST always be false — Master System is human-edited only
  hash_algorithm: "sha256"       # Content-hash algorithm for deduplication

source_types:
  video: "YT"
  public_post: "CP"
  paid_post: "PP"
  pdf: "D"
  external: "E"

automation:
  # Akshat Shrivastava official YouTube channel ID (verified)
  youtube_channel_id: "UCfU6El0eOFtDMwq24BoMpxQ"
  fetch_schedule: "0 6 * * 1"    # Every Monday 6am UTC
  max_transcript_age_days: 7
  pipeline_scripts:
    - "update_engine/extract_principles.py"
    - "update_engine/contradiction_checker.py"
    - "update_engine/update_recent_changes.py"
    - "update_engine/update_frequency_table.py"

keyword_review:
  cadence: "quarterly"
  instruction: "Review and expand PRINCIPLE_KEYWORDS in update_engine/extract_principles.py every quarter to capture new terminology Akshat introduces."
  last_reviewed: "2026-06-19"
