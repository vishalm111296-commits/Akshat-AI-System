# Akshat-AI-System Global Configuration
# L0 — Operating System

repository:
  name: Akshat-AI-System
  version: "1.0.0"
  built: "2026-06-19"
  maintainer: "vishalm111296-commits"

paths:
  knowledge: "knowledge/"
  raw_sources: "raw_sources/"
  skills: "skills/"
  automation: "automation/"
  changelog: "changelog/"
  tests: "tests/"

knowledge_files:
  master_system: "knowledge/01_Akshat_Master_System.md"
  frequency_table: "knowledge/02_Akshat_Principle_Frequency_Table.md"
  source_database: "knowledge/03_Akshat_Source_Database.md"
  recent_changes: "knowledge/04_Akshat_Recent_Changes.md"
  knowledge_router: "knowledge/05_Akshat_Knowledge_Router.md"
