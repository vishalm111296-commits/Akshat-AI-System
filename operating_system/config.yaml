source_types:
  video: "V"
  public_post: "PC"
  paid_post: "PP"
  pdf: "D"
  external: "E"

automation:
  youtube_channel_id: "UCqW8jxh4tH1Z1sWPbkGWL4g"
  fetch_schedule: "0 6 * * 1"     # Every Monday 6am UTC
  max_transcript_age_days: 7
