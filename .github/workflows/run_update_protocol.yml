name: Run Update Protocol on New Source

on:
  push:
    paths:
      - 'raw_sources/**'
    branches:
      - main

jobs:
  update_protocol:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          pip install pytest pyyaml

      - name: Record Master System hash BEFORE run
        run: |
          python - <<'EOF'
          import hashlib, json, os
          os.makedirs('.automation_state', exist_ok=True)
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              h = hashlib.sha256(f.read()).hexdigest()
          with open('.automation_state/master_hash.json', 'w') as out:
              json.dump({'hash': h, 'recorded_at': __import__('datetime').datetime.utcnow().isoformat()}, out, indent=2)
          print(f'Pre-run Master hash: {h[:16]}...')
          EOF

      - name: Run full update pipeline
        run: python automation/run_update_protocol.py

      - name: Verify Master System untouched AFTER run
        run: |
          python - <<'EOF'
          import hashlib, json, sys
          with open('.automation_state/master_hash.json') as f:
              stored = json.load(f)['hash']
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              current = hashlib.sha256(f.read()).hexdigest()
          if stored != current:
              print('CRITICAL VIOLATION: Master System modified by automation!')
              sys.exit(99)
          print(f'Master System SAFE. Hash: {current[:16]}...')
          EOF

      - name: Run pytest integrity checks
        run: pytest tests/test_pipeline_integrity.py -v --tb=short

      - name: Generate changelog entry
        run: python automation/generate_changelog_entry.py

      - name: Show what files changed
        run: |
          echo '=== Files changed this run ==='
          git status --short

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update protocol on new source [skip ci]"
          commit_user_name: "akshat-ai-automation"
          commit_user_email: "automation@akshat-ai-system.local"
          skip_dirty_check: false
