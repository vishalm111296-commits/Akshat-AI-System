name: Run Update Protocol on New Source

on:
  push:
    paths:
      - 'raw_sources/**'
    branches:
      - main

jobs:
  update_protocol:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          pip install pytest pyyaml

      - name: Record Master System hash BEFORE run
        id: pre_hash
        run: |
          python - <<'EOF'
          import hashlib, json, os
          os.makedirs('.automation_state', exist_ok=True)
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              h = hashlib.sha256(f.read()).hexdigest()
          with open('.automation_state/master_hash.json', 'w') as out:
              import datetime
              json.dump({'hash': h, 'recorded_at': datetime.datetime.utcnow().isoformat()}, out, indent=2)
          print(f'Pre-run Master hash: {h[:16]}...')
          EOF

      - name: Run full update pipeline
        run: python automation/run_update_protocol.py

      - name: Verify Master System untouched AFTER run
        run: |
          python - <<'EOF'
          import hashlib, json, sys
          with open('.automation_state/master_hash.json') as f:
              stored = json.load(f)['hash']
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              current = hashlib.sha256(f.read()).hexdigest()
          if stored != current:
              print('CRITICAL VIOLATION: Master System modified by automation!')
              sys.exit(99)
          print(f'Master System SAFE. Hash: {current[:16]}...')
          EOF

      - name: Run pytest integrity checks
        run: pytest tests/test_pipeline_integrity.py -v --tb=short

      - name: Generate changelog entry
        run: python automation/generate_changelog_entry.py

      - name: Show what files changed
        run: |
          echo '=== Files changed this run ==='
          git status --short
          echo '=== End of changed files ==='

      - name: Commit to staging branch and open PR
        id: open_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const runNum = '${{ github.run_number }}';
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const branch = `auto/update-${date}-${runNum}`;

            // Configure git
            execSync('git config user.name "akshat-ai-automation"');
            execSync('git config user.email "automation@akshat-ai-system.local"');

            // Check if there are any changes to commit
            const status = execSync('git status --porcelain').toString().trim();
            if (!status) {
              console.log('No changes to commit. Pipeline ran with no new sources.');
              return;
            }

            // Create staging branch from current HEAD
            execSync(`git checkout -b ${branch}`);
            execSync('git add -A');
            execSync(`git commit -m "auto: update protocol run #${runNum} [skip ci]"`);
            execSync(`git push origin ${branch}`);

            // Open a PR from staging -> main
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Knowledge update from new raw source — Run #${runNum}`,
              head: branch,
              base: 'main',
              body: [
                '## Automated Knowledge Update',
                '',
                `This PR was auto-generated by \`run_update_protocol.yml\` on run #${runNum}.`,
                '',
                '### Before merging, verify:',
                '- [ ] No unexpected changes to `knowledge/` files',
                '- [ ] `knowledge/01_Akshat_Master_System.md` is NOT changed (automation enforces this, but double-check)',
                '- [ ] `knowledge/04_Akshat_Recent_Changes.md` changes look correct',
                '- [ ] `knowledge/contradiction_report.md` reviewed if updated',
                '- [ ] Changelog entry looks sensible',
                '',
                '> **Do NOT auto-merge this PR.** Review first, then merge manually.',
              ].join('\n'),
            });
            console.log(`PR opened: ${pr.data.html_url}`);

      - name: Alert on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] run_update_protocol FAILED — Run #${{ github.run_number }}`,
              body: [
                '## Update Protocol Workflow Failed',
                '',
                `- **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                '',
                '### What triggered this',
                'A push to `raw_sources/**` triggered the update protocol, but the pipeline failed.',
                '',
                '### Steps to investigate',
                '1. Click the run link above',
                '2. Find the failed step (red X)',
                '3. Fix the issue and re-push or manually run the workflow',
              ].join('\n'),
              labels: ['automation-failure'],
            });
