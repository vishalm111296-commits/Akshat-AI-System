name: Weekly Content Fetch

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger at any time

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN so git-auto-commit-action can push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          pip install pytest pyyaml

      - name: Record Master System hash BEFORE run
        id: pre_hash
        run: |
          python - <<'EOF'
          import hashlib, json, os
          os.makedirs('.automation_state', exist_ok=True)
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              h = hashlib.sha256(f.read()).hexdigest()
          with open('.automation_state/master_hash.json', 'w') as out:
              json.dump({'hash': h, 'recorded_at': __import__('datetime').datetime.utcnow().isoformat()}, out, indent=2)
          print(f'Master hash recorded: {h[:16]}...')
          EOF

      - name: Fetch YouTube transcripts (REAL NETWORK CALL)
        run: python automation/fetch_youtube_transcripts.py
        # This makes a real HTTP request to YouTube RSS + transcript API
        # If no new videos: prints 0 fetched — this is CORRECT, not a failure

      - name: Run full update pipeline
        run: python automation/run_update_protocol.py
        # Pipeline: extract_principles → contradiction_checker → update_recent_changes → update_frequency_table
        # Steps 3+4 only act on APPROVED records — on first run they will log 'no approved records'
        # This is EXPECTED behaviour, not a failure

      - name: Verify Master System untouched AFTER run
        run: |
          python - <<'EOF'
          import hashlib, json, sys
          with open('.automation_state/master_hash.json') as f:
              stored = json.load(f)['hash']
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              current = hashlib.sha256(f.read()).hexdigest()
          if stored != current:
              print('CRITICAL VIOLATION: Master System hash changed during automation run!')
              print(f'  Stored:  {stored}')
              print(f'  Current: {current}')
              sys.exit(99)
          print(f'Master System integrity verified. Hash: {current[:16]}...')
          EOF

      - name: Run pytest integrity checks
        run: |
          pytest tests/test_pipeline_integrity.py -v --tb=short 2>&1
        # Tests verify: config consistency, RM-03 status, script existence, workflow presence
        # A test failure here means a structural problem — investigate before merging

      - name: Generate changelog entry (ALWAYS produces output)
        run: python automation/generate_changelog_entry.py
        # Generates a dated run-summary entry in CHANGELOG.md even if no new content
        # This makes every workflow run auditable

      - name: Show what files changed
        run: |
          echo '=== Files changed this run ==='
          git status --short
          echo '=== End of changed files ==='

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: weekly content fetch ${{ github.run_number }} [skip ci]"
          commit_user_name: "akshat-ai-automation"
          commit_user_email: "automation@akshat-ai-system.local"
          # Only commit if there are actual changes — prevents empty commits
          skip_dirty_check: false
