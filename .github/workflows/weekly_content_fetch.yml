name: Weekly Content Fetch

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger at any time

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          pip install pytest pyyaml

      - name: Ensure required directories exist
        run: |
          mkdir -p .automation_state
          mkdir -p raw_sources/youtube_transcripts
          mkdir -p raw_sources/community_posts
          mkdir -p raw_sources/paid_post
          mkdir -p changelog/entries
          # NOTE: canonical folder is paid_post/ (singular) — do NOT create paid_posts/

      - name: Record Master System hash BEFORE run
        id: pre_hash
        run: |
          python - <<'EOF'
          import hashlib, json, os
          os.makedirs('.automation_state', exist_ok=True)
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              h = hashlib.sha256(f.read()).hexdigest()
          with open('.automation_state/master_hash.json', 'w') as out:
              import datetime
              json.dump({'hash': h, 'recorded_at': datetime.datetime.utcnow().isoformat()}, out, indent=2)
          print(f'Master hash recorded: {h[:16]}...')
          EOF

      - name: Fetch YouTube transcripts
        id: youtube_fetch
        run: python automation/fetch_youtube_transcripts.py
        continue-on-error: true
        # YouTube may block CI runners. Pipeline continues but failure is tracked below.

      - name: Alert on YouTube fetch failure
        if: steps.youtube_fetch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] YouTube fetch failed — Run #${{ github.run_number }}`,
              body: [
                '## YouTube Transcript Fetch Failed',
                '',
                `- **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                `- **Triggered at:** ${{ github.event.head_commit.timestamp || 'scheduled' }}`,
                '',
                '### What to check',
                '- YouTube may be blocking the CI runner IP',
                '- `youtube-transcript-api` version may need updating in `automation/requirements.txt`',
                '- Check the run logs for the exact error',
                '',
                '### Action required',
                'Manually fetch the transcript and add to `raw_sources/youtube_transcripts/`',
              ].join('\n'),
              labels: ['automation-failure', 'needs-manual-action'],
            });

      - name: Run full update pipeline
        run: python automation/run_update_protocol.py
        continue-on-error: true
        # If no new raw sources, step logs 'no approved records' — expected behaviour.

      - name: Verify Master System untouched AFTER run
        run: |
          python - <<'EOF'
          import hashlib, json, sys
          with open('.automation_state/master_hash.json') as f:
              stored = json.load(f)['hash']
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              current = hashlib.sha256(f.read()).hexdigest()
          if stored != current:
              print('CRITICAL VIOLATION: Master System hash changed during automation run!')
              print(f'  Stored:  {stored}')
              print(f'  Current: {current}')
              sys.exit(99)
          print(f'Master System integrity verified. Hash: {current[:16]}...')
          EOF

      - name: Run pytest integrity checks
        run: |
          pytest tests/test_pipeline_integrity.py -v --tb=short 2>&1

      - name: Generate changelog entry
        run: python automation/generate_changelog_entry.py

      - name: Show what files changed
        run: |
          echo '=== Files changed this run ==='
          git status --short
          echo '=== End of changed files ==='

      - name: Commit to staging branch and open PR
        id: open_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const runNum = '${{ github.run_number }}';
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const branch = `auto/weekly-${date}-${runNum}`;

            // Configure git
            execSync('git config user.name "akshat-ai-automation"');
            execSync('git config user.email "automation@akshat-ai-system.local"');

            // Check if there are any changes to commit
            const status = execSync('git status --porcelain').toString().trim();
            if (!status) {
              console.log('No changes this week');
              return;
            }

            // Create staging branch from current HEAD
            execSync(`git checkout -b ${branch}`);
            execSync('git add -A');
            execSync(`git commit -m "auto: weekly content fetch #${runNum} [skip ci]"`);
            execSync(`git push origin ${branch}`);

            // Open a PR from staging -> main
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Weekly content fetch — Run #${runNum}`,
              head: branch,
              base: 'main',
              body: [
                '## Automated Weekly Content Fetch',
                '',
                `This PR was auto-generated by \`weekly_content_fetch.yml\` on run #${runNum}.`,
                '',
                '### Before merging, verify:',
                '- [ ] YouTube transcripts look correct',
                '- [ ] No unexpected knowledge file changes',
                '- [ ] Changelog entry is sensible',
                '- [ ] Do NOT auto-merge — review manually',
              ].join('\n'),
            });
            console.log(`PR opened: ${pr.data.html_url}`);

      - name: Alert on overall workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AUTO] Weekly content fetch FAILED — Run #${{ github.run_number }}`,
              body: [
                '## Weekly Content Fetch Workflow Failed',
                '',
                `- **Workflow run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                '',
                '### Steps to investigate',
                '1. Click the workflow run link above',
                '2. Identify which step failed (red X)',
                '3. Check the logs for the exact error',
                '',
                '> This issue was auto-created by the weekly_content_fetch.yml workflow.',
              ].join('\n'),
              labels: ['automation-failure'],
            });
