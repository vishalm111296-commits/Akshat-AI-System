name: Weekly Content Fetch

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 6 AM UTC
  workflow_dispatch:       # Allow manual trigger at any time

jobs:
  fetch_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r automation/requirements.txt
          pip install pytest pyyaml

      - name: Ensure required directories exist
        run: |
          mkdir -p .automation_state
          mkdir -p raw_sources/youtube_transcripts
          mkdir -p raw_sources/community_posts
          mkdir -p raw_sources/paid_posts
          mkdir -p changelog/entries

      - name: Record Master System hash BEFORE run
        id: pre_hash
        run: |
          python - <<'EOF'
          import hashlib, json, os
          os.makedirs('.automation_state', exist_ok=True)
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              h = hashlib.sha256(f.read()).hexdigest()
          with open('.automation_state/master_hash.json', 'w') as out:
              import datetime
              json.dump({'hash': h, 'recorded_at': datetime.datetime.utcnow().isoformat()}, out, indent=2)
          print(f'Master hash recorded: {h[:16]}...')
          EOF

      - name: Fetch YouTube transcripts
        run: python automation/fetch_youtube_transcripts.py
        continue-on-error: true
        # continue-on-error: YouTube may block CI runners. Pipeline still continues.

      - name: Run full update pipeline
        run: python automation/run_update_protocol.py
        continue-on-error: true
        # continue-on-error: If no new raw sources, steps log 'no approved records' — expected.

      - name: Verify Master System untouched AFTER run
        run: |
          python - <<'EOF'
          import hashlib, json, sys
          with open('.automation_state/master_hash.json') as f:
              stored = json.load(f)['hash']
          with open('knowledge/01_Akshat_Master_System.md', 'rb') as f:
              current = hashlib.sha256(f.read()).hexdigest()
          if stored != current:
              print('CRITICAL VIOLATION: Master System hash changed during automation run!')
              print(f'  Stored:  {stored}')
              print(f'  Current: {current}')
              sys.exit(99)
          print(f'Master System integrity verified. Hash: {current[:16]}...')
          EOF

      - name: Run pytest integrity checks
        run: |
          pytest tests/test_pipeline_integrity.py -v --tb=short 2>&1

      - name: Generate changelog entry
        run: python automation/generate_changelog_entry.py

      - name: Show what files changed
        run: |
          echo '=== Files changed this run ==='
          git status --short
          echo '=== End of changed files ==='

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: weekly content fetch ${{ github.run_number }} [skip ci]"
          commit_user_name: "akshat-ai-automation"
          commit_user_email: "automation@akshat-ai-system.local"
          skip_dirty_check: false
